services:
  # PHP Application
  app:
    build:
      context: ./SportifyGear
      dockerfile: Dockerfile
    container_name: sportify-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./SportifyGear:/var/www:z
    networks:
      - sportify-network
    depends_on:
      - db

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: sportify-nginx
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - ./SportifyGear:/var/www:z
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:z
    networks:
      - sportify-network
    depends_on:
      - app

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: sportify-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ecommercewebsite
      MYSQL_USER: sportify
      MYSQL_PASSWORD: sportify_secret
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - sportify-network

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:z
    ports:
      - "9090:9090"
    networks:
      - sportify-network

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:z
    networks:
      - sportify-network
    depends_on:
      - prometheus

  # Node Exporter (Host Metrics)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - sportify-network

networks:
  sportify-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
